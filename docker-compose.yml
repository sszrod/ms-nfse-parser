services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ms-nfse-parser-api
        working_dir: /app
        user: "${UID:-1000}:${GID:-1000}"
        environment:
            APP_ENV: dev
            HOME: /tmp
            COMPOSER_HOME: /tmp/.composer
        volumes:
            - ./:/app
        ports:
            - "8000:8000"
        depends_on:
            mongodb:
                condition: service_healthy
        command: php -S 0.0.0.0:8000 -t public

    mongodb:
        image: mongo:7
        container_name: ms-nfse-parser-mongodb
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        healthcheck:
            test:
                [
                    "CMD",
                    "mongosh",
                    "--quiet",
                    "--eval",
                    "db.adminCommand('ping').ok",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    mongodb_data:
